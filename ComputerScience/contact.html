            <h1>Ask a Question</h1>

            <form action="action_page.php" method="GET" target="_blank" class="form=container">
				

            <div class="form-row">
				<label for="firstName">First Name: </label><br>
            	<input type="text" id="firstName" name="firstName"><br>

            <div class="form-row">
				<label for="lastName">Last Name: </label><br>
            	<input type="text" id="lastName" name="lastName"><br> 
            
            <div class="form-row">
				<label for="email"> Enter your email: </label><br>
            	<input type="email" id="email" name="email"><br>
            
            <div class="form-row">
				<label for="password">password: </label><br>
            	<input type="password" id="password" name="password"><br>
            
			<div class="form-row">
				<!---Gender radio buttons (only one gender)-->
            	<input type="radio" id="male" name="gender" value="male">
            	<label for="male">Male</label><br>
				<input type="radio" id="female" name="gender" value="female">
            	<label for="female">Female</label>
				<input type="radio" id="other" name="gender" value="other">
            	<label for="other">Other</label><br>            
            
			<div class="form-row">
  			  <label for="course">Courses:</label>
    		<select id="course" name="course">
    		  <option value="1301">COSC 1301</option>
      		  <option value="1315">COSC 1315</option>
      		  <option value="1320">COSC 1320</option>
      		<option value="1436">COSC 1436</option>
    		</select>
  			</div>

            </fieldset>

            <!---Type question-->
           <div class="form-row">
   			 <label for="question">Type your question here:</label>
  		     <textarea id="question" name="question" rows="4"></textarea>
 		   </div>

             <button type="submit">Submit</button>

            </form>
