<!DOCTYPE html>
<html>

<head lang="en">
    <meta charset="UTF-8">
    <title>Tax Calculator</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="tax-box">
  <h2>Sales Tax Calculator (8.25%)</h2>

  <label for="amount">Purchase Amount:</label>
  <input type="number" id="amount" step="0.01" placeholder="Enter amount">

  <button type="button" onclick="calculateTax()">Calculate</button>

  <label for="tax">Tax (8.25%):</label>
  <input type="text" id="tax" disabled>

  <label for="total">Total:</label>
  <input type="text" id="total" disabled>
</div>

<script>
function calculateTax() {
  const TAX_RATE = 0.0825;

  let amount = parseFloat(document.getElementById("amount").value);

  if (isNaN(amount) || amount < 0) {
    alert("Please enter a valid purchase amount.");
    return;
  }

  let tax = amount * TAX_RATE;
  let total = amount + tax;

  document.getElementById("tax").value = tax.toFixed(2);
  document.getElementById("total").value = total.toFixed(2);
}
</script>


</body>

</html>
